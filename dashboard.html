<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachAI Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Arial',sans-serif;}
body{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1950&q=80') no-repeat center center/cover;
  position:relative;
}
body::before{
  content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:0;
}
.box{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:350px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:15px;
  text-align:center;
  color:#fff;
  box-shadow:0 0 20px cyan;
  z-index:1;
}
h2{margin-bottom:15px;color:cyan;text-shadow:0 0 6px cyan;}
label{text-align:left;width:100%;display:block;margin-top:10px;color:#fff;}
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.2);
  color:#fff;
}
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:cyan;
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}
button:hover{box-shadow:0 0 15px cyan;}
.logout{
  margin-top:10px;
  cursor:pointer;
  color:cyan;
  text-decoration:underline;
}
</style>
</head>
<body>

<div class="box">
  <h2 id="welcomeText">Welcome!</h2>

  <label>Reminder Text</label>
  <input type="text" id="msg" placeholder="Enter something to remember">

  <label>Time (24-hour format)</label>
  <input type="time" id="time">

  <button id="saveBtn">Save Reminder</button>

  <div class="logout" onclick="logout()">Logout</div>
</div>

<script>
// Show username
const name = localStorage.getItem("username");
document.getElementById("welcomeText").innerText = "Welcome " + name + "!";

// Logout function
function logout(){
  localStorage.removeItem("logged");
  location.href = "index.html";
}

// YOUR FIXED CODE 🔥
const chatId = "7190824172";

document.getElementById("saveBtn").onclick = () => {
    const msg = document.getElementById("msg").value;
    const time = document.getElementById("time").value;

    if(!msg || !time){
        alert("Fill message & time");
        return;
    }

    fetch("http://localhost:3000/task", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chatId, message: msg, time })
    })
    .then(res => res.json())
    .then(() => {
        alert("Reminder saved! Wait for reminder 😊");
        document.getElementById("msg").value="";
        document.getElementById("time").value="";
    })
    .catch(err => console.log(err));
};
</script>

</body>
</html>
